spring:
  application:
    name: expense-manager

  datasource:
    url: jdbc:mysql://localhost:3306/expense_manager
    username: root
    password: Raj@123

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: your_super_secret_key_which_should_be_long_and_secure
  expiration: 3600000

logging:
  level:
    root: INFO
    com.rajendra.expensemanager: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"