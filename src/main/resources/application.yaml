server:
  port: ${PORT:8080}

spring:
  application:
    name: expense-manager
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:default}

  datasource:
    url: jdbc:mysql://localhost:3306/expense_manager
    username: root
    password: ${DB_LOCAL_PASSWORD:Raj@123}

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

jwt:
  secret: ${JWT_SECRET:your_super_secret_key_which_should_be_long_and_secure}
  expiration: 36000000

logging:
  level:
    root: INFO
    com.rajendra.expensemanager: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"